# ── Database ──────────────────────────────────────────────────────────────────
# Locally: uses H2 file DB. On Render: override with env vars pointing to Neon Postgres.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/racketdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ── H2 Console (local dev only) ───────────────────────────────────────────────
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
