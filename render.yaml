services:
  - type: web
    name: racket-ladder-api
    runtime: java
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/racket-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/leaderboard/global
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Neon JDBC URL here in Render dashboard
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: H2_CONSOLE
        value: "false"
      - key: CORS_ORIGIN
        sync: false          # paste your Vercel frontend URL here after deploying frontend
